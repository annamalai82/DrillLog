    });

    const updateField = (key, val) => setFormData(prev => ({ ...prev, [key]: val }));

    const handleSave = () => {
      // validation
      if (formType === "geolog") {
        if (formData.fromM >= formData.toM) { showToast("'From' must be less than 'To'", "danger"); return; }
        if (!formData.lithology) { showToast("Please select a lithology", "danger"); return; }
        if (editingItem) {
          setGeoLogs(prev => prev.map(l => l.id === editingItem.id ? { ...formData, id: editingItem.id, holeId: selectedHole, synced: false, timestamp: new Date().toISOString() } : l));
          addAudit("EDIT", "GeoLog", editingItem.id, `Updated geology log ${formData.fromM}-${formData.toM}m`);
        } else {
          const newId = generateId();
          setGeoLogs(prev => [...prev, { ...formData, id: newId, holeId: selectedHole, synced: false, timestamp: new Date().toISOString() }]);
          addAudit("CREATE", "GeoLog", newId, `Created geology log ${formData.fromM}-${formData.toM}m`);
        }
      }
      if (formType === "geotech") {
        if (formData.fromM >= formData.toM) { showToast("'From' must be less than 'To'", "danger"); return; }
        if (editingItem) {
          setGeotechLogs(prev => prev.map(l => l.id === editingItem.id ? { ...formData, id: editingItem.id, holeId: selectedHole, synced: false } : l));
          addAudit("EDIT", "GeotechLog", editingItem.id, `Updated geotech log ${formData.fromM}-${formData.toM}m`);
        } else {
          const newId = generateId();
          setGeotechLogs(prev => [...prev, { ...formData, id: newId, holeId: selectedHole, synced: false }]);
          addAudit("CREATE", "GeotechLog", newId, `Created geotech log ${formData.fromM}-${formData.toM}m`);
        }
      }
      if (formType === "sample") {
        if (editingItem) {
          setSamples(prev => prev.map(s => s.id === editingItem.id ? { ...formData, id: editingItem.id, holeId: selectedHole, synced: false } : s));
          addAudit("EDIT", "Sample", editingItem.id, `Updated sample ${formData.sampleId}`);
        } else {
          const newId = generateId();
          setSamples(prev => [...prev, { ...formData, id: newId, holeId: selectedHole, synced: false, labId: null, dispatchDate: null }]);
          addAudit("CREATE", "Sample", newId, `Created sample ${formData.sampleId}`);
        }
      }
      if (formType === "plod") {
        formData.metresDrilled = formData.toM - formData.fromM;
        if (editingItem) {
          setPlods(prev => prev.map(p => p.id === editingItem.id ? { ...formData, id: editingItem.id, holeId: selectedHole, synced: false } : p));
          addAudit("EDIT", "PLOD", editingItem.id, `Updated DDR for ${formData.date}`);
        } else {
          const newId = generateId();
          setPlods(prev => [...prev, { ...formData, id: newId, holeId: selectedHole, synced: false }]);
          addAudit("CREATE", "PLOD", newId, `Created DDR for ${formData.date}`);
        }
      }
      if (formType === "survey") {
        const newId = generateId();
        setSurveys(prev => [...prev, { ...formData, id: newId, holeId: selectedHole, synced: false }]);
        addAudit("CREATE", "Survey", newId, `Added survey at ${formData.depth}m`);
      }
      if (formType === "hole") {
        const newId = generateId();
        setDrillHoles(prev => [...prev, { ...formData, id: newId, projectId: activeProject }]);
        addAudit("CREATE", "DrillHole", newId, `Created drill hole ${formData.holeId}`);
      }
      if (formType === "dispatch") {
        const pendingSamples = samples.filter(s => s.holeId === selectedHole && s.status === "pending");
        setSamples(prev => prev.map(s => {
          if (s.holeId === selectedHole && s.status === "pending") {
            return { ...s, status: "dispatched", labId: formData.labId, dispatchDate: formData.dispatchDate, synced: false };
          }
          return s;
        }));
        addAudit("DISPATCH", "Sample", "batch", `Dispatched ${pendingSamples.length} samples to ${formData.labId}`);
        showToast(`Dispatched ${pendingSamples.length} samples to ${formData.labId}`, "success");
      }

      showToast(editingItem ? "Record updated!" : "Record created!", "success");
      setShowForm(false);
      setEditingItem(null);
    };

    const InputField = ({ label, value, onChange, type = "text", placeholder = "", required = false }) => (
      <div style={{ marginBottom: 14 }}>
        <label style={{ display: "block", fontSize: 11, fontWeight: 600, color: t.textMuted, marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.05em" }}>
          {label} {required && <span style={{ color: t.danger }}>*</span>}
        </label>
        <input
          type={type} value={value} onChange={e => onChange(type === "number" ? parseFloat(e.target.value) || 0 : e.target.value)} placeholder={placeholder}
          style={{ width: "100%", padding: "10px 12px", background: t.bgInput, border: `1px solid ${t.border}`, borderRadius: 8, color: t.text, fontSize: 14, outline: "none", boxSizing: "border-box" }}
        />
      </div>
    );

    const SelectField = ({ label, value, onChange, options, required = false }) => (
      <div style={{ marginBottom: 14 }}>
        <label style={{ display: "block", fontSize: 11, fontWeight: 600, color: t.textMuted, marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.05em" }}>
          {label} {required && <span style={{ color: t.danger }}>*</span>}
        </label>
        <select
          value={value} onChange={e => onChange(e.target.value)}
          style={{ width: "100%", padding: "10px 12px", background: t.bgInput, border: `1px solid ${t.border}`, borderRadius: 8, color: t.text, fontSize: 14, outline: "none", boxSizing: "border-box" }}
        >
          <option value="">Select...</option>
          {options.map(o => <option key={typeof o === "string" ? o : o.code} value={typeof o === "string" ? o : o.code}>{typeof o === "string" ? o : `${o.code} - ${o.name}`}</option>)}
        </select>
      </div>
    );

    const TextAreaField = ({ label, value, onChange, rows = 3 }) => (
      <div style={{ marginBottom: 14 }}>
        <label style={{ display: "block", fontSize: 11, fontWeight: 600, color: t.textMuted, marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.05em" }}>{label}</label>
        <textarea
          value={value} onChange={e => onChange(e.target.value)} rows={rows}
          style={{ width: "100%", padding: "10px 12px", background: t.bgInput, border: `1px solid ${t.border}`, borderRadius: 8, color: t.text, fontSize: 14, outline: "none", resize: "vertical", fontFamily: "inherit", boxSizing: "border-box" }}
        />
      </div>
    );

    const MultiSelect = ({ label, options, selected, onChange }) => (
      <div style={{ marginBottom: 14 }}>
        <label style={{ display: "block", fontSize: 11, fontWeight: 600, color: t.textMuted, marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.05em" }}>{label}</label>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
          {options.map(o => {
            const isSelected = selected.includes(o);
            return (
              <button key={o} onClick={() => onChange(isSelected ? selected.filter(s => s !== o) : [...selected, o])}
                style={{ padding: "6px 12px", borderRadius: 16, border: `1px solid ${isSelected ? t.accent : t.border}`, background: isSelected ? t.accentBg : "transparent", color: isSelected ? t.accent : t.textMuted, fontSize: 12, cursor: "pointer", fontWeight: isSelected ? 600 : 400 }}>
                {o}
              </button>
            );
          })}
        </div>
      </div>
    );

    return (
      <div style={{ position: "fixed", inset: 0, zIndex: 200, display: "flex", flexDirection: "column", background: t.bg }}>
        {/* Header */}
        <div style={{ display: "flex", alignItems: "center", padding: "12px 16px", borderBottom: `1px solid ${t.border}`, background: t.bgCard }}>
          <button onClick={() => { setShowForm(false); setEditingItem(null); }} style={{ background: "none", border: "none", color: t.textMuted, cursor: "pointer", padding: 4 }}>
            <Icon d={Icons.close} size={22} />
          </button>
          <h3 style={{ flex: 1, margin: 0, paddingLeft: 12, color: t.text, fontSize: 17, fontWeight: 700 }}>
            {editingItem ? "Edit" : "New"} {formType === "geolog" ? "Geology Log" : formType === "geotech" ? "Geotech Log" : formType === "sample" ? "Sample" : formType === "plod" ? "Daily Drill Report" : formType === "survey" ? "Downhole Survey" : formType === "hole" ? "Drill Hole" : "Dispatch"}
          </h3>
          <button onClick={handleSave} style={{ padding: "8px 20px", borderRadius: 8, border: "none", background: t.accent, color: "#fff", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>
            Save
          </button>
        </div>

        {/* Form Body */}
        <div style={{ flex: 1, overflow: "auto", padding: 16 }}>
          {formType === "geolog" && (<>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              <InputField label="From (m)" value={formData.fromM} onChange={v => updateField("fromM", v)} type="number" required />
              <InputField label="To (m)" value={formData.toM} onChange={v => updateField("toM", v)} type="number" required />
            </div>
            <SelectField label="Lithology" value={formData.lithology} onChange={v => updateField("lithology", v)} options={LITHOLOGY_CODES} required />
            {formData.lithology && (
              <div style={{ marginBottom: 14, padding: 10, borderRadius: 8, background: t.bgInput, display: "flex", alignItems: "center", gap: 10 }}>
                <div style={{ width: 28, height: 28, borderRadius: 6, background: LITHOLOGY_CODES.find(l => l.code === formData.lithology)?.color || "#888", border: `1px solid ${t.border}` }} />
                <span style={{ color: t.text, fontSize: 13, fontWeight: 600 }}>{LITHOLOGY_CODES.find(l => l.code === formData.lithology)?.name}</span>
                <span style={{ color: t.textMuted, fontSize: 12, marginLeft: "auto" }}>{LITHOLOGY_CODES.find(l => l.code === formData.lithology)?.group}</span>
              </div>
            )}
            <SelectField label="Alteration" value={formData.alteration} onChange={v => updateField("alteration", v)} options={ALTERATION_TYPES} />
            <SelectField label="Weathering" value={formData.weathering} onChange={v => updateField("weathering", v)} options={WEATHERING} />
            <MultiSelect label="Mineralization" options={MINERALIZATION} selected={formData.mineralization} onChange={v => updateField("mineralization", v)} />
            <SelectField label="Structure" value={formData.structure} onChange={v => updateField("structure", v)} options={STRUCTURE_TYPES} />
            <InputField label="Colour" value={formData.color} onChange={v => updateField("color", v)} placeholder="e.g., Grey-Green" />
            <InputField label="Grain Size" value={formData.grainSize} onChange={v => updateField("grainSize", v)} placeholder="e.g., Fine-Medium" />
            <TextAreaField label="Notes / Description" value={formData.notes} onChange={v => updateField("notes", v)} rows={4} />
          </>)}

          {formType === "geotech" && (<>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              <InputField label="From (m)" value={formData.fromM} onChange={v => updateField("fromM", v)} type="number" required />
              <InputField label="To (m)" value={formData.toM} onChange={v => updateField("toM", v)} type="number" required />
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              <InputField label="RQD (%)" value={formData.rqd} onChange={v => updateField("rqd", v)} type="number" />
              <InputField label="Recovery (%)" value={formData.recovery} onChange={v => updateField("recovery", v)} type="number" />
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
              <InputField label="Hardness" value={formData.hardness} onChange={v => updateField("hardness", v)} placeholder="R1-R6" />
              <InputField label="Frac. Freq" value={formData.fracFreq} onChange={v => updateField("fracFreq", v)} type="number" />
              <InputField label="JRC" value={formData.jrc} onChange={v => updateField("jrc", v)} type="number" />
            </div>
            <InputField label="Joint Alteration (Ja)" value={formData.ja} onChange={v => updateField("ja", v)} type="number" />
            <TextAreaField label="Notes" value={formData.notes} onChange={v => updateField("notes", v)} />
          </>)}

          {formType === "sample" && (<>
            <InputField label="Sample ID" value={formData.sampleId} onChange={v => updateField("sampleId", v)} required />
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              <InputField label="From (m)" value={formData.fromM} onChange={v => updateField("fromM", v)} type="number" />
              <InputField label="To (m)" value={formData.toM} onChange={v => updateField("toM", v)} type="number" />
            </div>
            <SelectField label="Sample Type" value={formData.type} onChange={v => updateField("type", v)} options={SAMPLE_TYPES} />
            <SelectField label="QC Type" value={formData.qcType || ""} onChange={v => updateField("qcType", v || null)} options={["", ...QC_TYPES]} />
          </>)}

          {formType === "plod" && (<>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              <InputField label="Date" value={formData.date} onChange={v => updateField("date", v)} type="date" required />
              <SelectField label="Shift" value={formData.shift} onChange={v => updateField("shift", v)} options={SHIFT_TYPES} />
            </div>
            <InputField label="Driller Name" value={formData.driller} onChange={v => updateField("driller", v)} required />
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
              <InputField label="From (m)" value={formData.fromM} onChange={v => updateField("fromM", v)} type="number" />
              <InputField label="To (m)" value={formData.toM} onChange={v => updateField("toM", v)} type="number" />
              <InputField label="Core Size" value={formData.coreSize} onChange={v => updateField("coreSize", v)} />
            </div>
            <InputField label="Bit Used" value={formData.bitUsed} onChange={v => updateField("bitUsed", v)} />
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              <InputField label="Hours Worked" value={formData.hoursWorked} onChange={v => updateField("hoursWorked", v)} type="number" />
              <InputField label="Downtime (hrs)" value={formData.downtime} onChange={v => updateField("downtime", v)} type="number" />
            </div>
            <InputField label="Downtime Reason" value={formData.downtimeReason} onChange={v => updateField("downtimeReason", v)} />
            <InputField label="Water Usage (L)" value={formData.waterUsage} onChange={v => updateField("waterUsage", v)} type="number" />
            <InputField label="Consumables" value={formData.consumables} onChange={v => updateField("consumables", v)} />
            <TextAreaField label="Notes" value={formData.notes} onChange={v => updateField("notes", v)} rows={3} />
          </>)}

          {formType === "survey" && (<>
            <InputField label="Depth (m)" value={formData.depth} onChange={v => updateField("depth", v)} type="number" required />
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              <InputField label="Azimuth (°)" value={formData.azimuth} onChange={v => updateField("azimuth", v)} type="number" required />
              <InputField label="Dip (°)" value={formData.dip} onChange={v => updateField("dip", v)} type="number" required />
            </div>
            <SelectField label="Survey Method" value={formData.method} onChange={v => updateField("method", v)} options={["Collar", "Gyro", "EMS", "North Seeking Gyro", "Reflex"]} />
          </>)}

          {formType === "hole" && (<>
            <InputField label="Hole ID" value={formData.holeId} onChange={v => updateField("holeId", v)} required />
            <SelectField label="Drill Method" value={formData.method} onChange={v => updateField("method", v)} options={["DD", "RC", "AC", "RAB"]} />
            <SelectField label="Status" value={formData.status} onChange={v => updateField("status", v)} options={["planned", "drilling", "logging", "complete"]} />
            <InputField label="Start Date" value={formData.startDate} onChange={v => updateField("startDate", v)} type="date" />
            <div style={{ padding: "8px 0", marginBottom: 8 }}>
              <span style={{ fontSize: 13, fontWeight: 700, color: t.accent, textTransform: "uppercase", letterSpacing: "0.05em" }}>Collar Coordinates</span>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              <InputField label="Easting" value={formData.collar?.easting} onChange={v => updateField("collar", { ...formData.collar, easting: v })} type="number" />
              <InputField label="Northing" value={formData.collar?.northing} onChange={v => updateField("collar", { ...formData.collar, northing: v })} type="number" />
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
              <InputField label="RL" value={formData.collar?.rl} onChange={v => updateField("collar", { ...formData.collar, rl: v })} type="number" />
              <InputField label="Azimuth" value={formData.collar?.azimuth} onChange={v => updateField("collar", { ...formData.collar, azimuth: v })} type="number" />
              <InputField label="Dip" value={formData.collar?.dip} onChange={v => updateField("collar", { ...formData.collar, dip: v })} type="number" />
            </div>
          </>)}

          {formType === "dispatch" && (<>
            <InputField label="Lab ID" value={formData.labId} onChange={v => updateField("labId", v)} placeholder="e.g., ALS-PER, SGS-PER" required />
            <InputField label="Dispatch Date" value={formData.dispatchDate} onChange={v => updateField("dispatchDate", v)} type="date" required />
            <div style={{ padding: 14, borderRadius: 10, background: t.warnBg, border: `1px solid ${t.warn}30`, marginBottom: 14 }}>
              <span style={{ color: t.warn, fontSize: 13, fontWeight: 600 }}>
                {samples.filter(s => s.holeId === selectedHole && s.status === "pending").length} pending samples will be dispatched
              </span>
            </div>
            <TextAreaField label="Dispatch Notes" value={formData.notes} onChange={v => updateField("notes", v)} />
          </>)}
        </div>
      </div>
    );
  };

  // ─── STRIP LOG VISUALIZATION ───
  const StripLog = ({ logs }) => {
    if (!logs || logs.length === 0) return null;
    const maxDepth = Math.max(...logs.map(l => l.toM));
    const scale = 400 / maxDepth;
    return (
      <div style={{ display: "flex", gap: 2, overflow: "hidden", borderRadius: 8, border: `1px solid ${t.border}`, height: 400, position: "relative" }}>
        {/* Depth scale */}
        <div style={{ width: 40, position: "relative", background: t.bgInput, flexShrink: 0 }}>
          {logs.map(l => (
            <div key={l.id} style={{ position: "absolute", top: l.fromM * scale, right: 4, fontSize: 9, color: t.textDim }}>{l.fromM}m</div>
          ))}
          <div style={{ position: "absolute", bottom: 2, right: 4, fontSize: 9, color: t.textDim }}>{maxDepth}m</div>
        </div>
        {/* Lithology column */}
        <div style={{ width: 30, position: "relative", flexShrink: 0 }}>
          {logs.map(l => {
            const lith = LITHOLOGY_CODES.find(c => c.code === l.lithology);
            return (
              <div key={l.id} style={{
                position: "absolute", top: l.fromM * scale, height: (l.toM - l.fromM) * scale, width: "100%",
                background: lith?.color || "#666", borderBottom: `1px solid ${t.border}`,
              }} />
            );
          })}
        </div>
        {/* Description */}
        <div style={{ flex: 1, position: "relative", overflow: "hidden" }}>
          {logs.map(l => {
            const lith = LITHOLOGY_CODES.find(c => c.code === l.lithology);
            return (
              <div key={l.id} style={{
                position: "absolute", top: l.fromM * scale, height: Math.max((l.toM - l.fromM) * scale - 1, 16), width: "100%",
                padding: "2px 6px", overflow: "hidden",
                borderBottom: `1px solid ${t.border}`,
              }}>
                <span style={{ fontSize: 10, fontWeight: 700, color: t.text }}>{lith?.code}</span>
                {l.mineralization?.length > 0 && <span style={{ fontSize: 9, color: t.warn, marginLeft: 4 }}>{l.mineralization.join(", ")}</span>}
              </div>
            );
          })}
        </div>
      </div>
    );
  };

  // ─── DASHBOARD VIEW ───
  const DashboardView = () => {
    const totalMetres = plods.filter(p => projectHoles.some(h => h.id === p.holeId)).reduce((a, p) => a + p.metresDrilled, 0);
    const totalSamples = samples.filter(s => projectHoles.some(h => h.id === s.holeId)).length;
    const dispatched = samples.filter(s => projectHoles.some(h => h.id === s.holeId) && s.status === "dispatched").length;

    return (
      <div style={{ padding: 16 }}>
        {/* Project Selector */}
        <div style={{ marginBottom: 20 }}>
          <select value={activeProject} onChange={e => setActiveProject(e.target.value)}
            style={{ width: "100%", padding: "12px 14px", background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 10, color: t.text, fontSize: 15, fontWeight: 700, outline: "none" }}>
            {projects.map(p => <option key={p.id} value={p.id}>{p.name} ({p.code})</option>)}
          </select>
        </div>

        {/* Stat Cards */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 20 }}>
          {[
            { label: "Drill Holes", value: projectHoles.length, color: t.accent, icon: Icons.drill },
            { label: "Total Metres", value: `${totalMetres.toFixed(1)}m`, color: t.info, icon: Icons.layers },
            { label: "Samples", value: totalSamples, color: t.success, icon: Icons.sample },
            { label: "Unsynced", value: unsyncedCount, color: unsyncedCount > 0 ? t.warn : t.success, icon: Icons.sync },
          ].map((s, i) => (
            <div key={i} style={{ padding: 16, borderRadius: 12, background: t.bgCard, border: `1px solid ${t.border}` }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                <Icon d={s.icon} size={18} color={s.color} />
                <span style={{ fontSize: 10, color: t.textMuted, textTransform: "uppercase", letterSpacing: "0.05em" }}>{s.label}</span>
              </div>
              <div style={{ fontSize: 24, fontWeight: 800, color: s.color }}>{s.value}</div>
            </div>
          ))}
        </div>

        {/* Sync Button */}
        <button onClick={handleSync} disabled={syncStatus === "syncing" || unsyncedCount === 0}
          style={{
            width: "100%", padding: 16, borderRadius: 12, border: "none", cursor: unsyncedCount > 0 ? "pointer" : "default",
            background: syncStatus === "syncing" ? t.warnBg : unsyncedCount > 0 ? `linear-gradient(135deg, ${t.accent}, ${t.accentDim})` : t.bgCard,
            color: unsyncedCount > 0 ? "#fff" : t.textMuted, fontSize: 15, fontWeight: 700,
            display: "flex", alignItems: "center", justifyContent: "center", gap: 10, marginBottom: 20,
            opacity: unsyncedCount === 0 ? 0.5 : 1,
          }}>
          <Icon d={Icons.sync} size={20} color={unsyncedCount > 0 ? "#fff" : t.textMuted} style={syncStatus === "syncing" ? { animation: "spin 1s linear infinite" } : {}} />
          {syncStatus === "syncing" ? "Syncing..." : syncStatus === "synced" ? "All Synced!" : unsyncedCount > 0 ? `Sync ${unsyncedCount} Records to Database` : "All Records Synced"}
        </button>

        {lastSyncTime && (
          <div style={{ textAlign: "center", fontSize: 11, color: t.textDim, marginBottom: 16, marginTop: -12 }}>
            Last sync: {lastSyncTime}
          </div>
        )}

        {/* Drill Holes List */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
          <h3 style={{ margin: 0, color: t.text, fontSize: 16, fontWeight: 700 }}>Drill Holes</h3>
          <button onClick={() => { setFormType("hole"); setShowForm(true); }}

          </div>
          <button onClick={handleExport}
            style={{ width: "100%", padding: 12, borderRadius: 10, border: "none", background: t.accent, color: "#fff", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>
            Export {exportType} as {exportFormat.toUpperCase()}
          </button>
        </div>

        {/* Import Section */}
        <div style={{ padding: 16, borderRadius: 12, background: t.bgCard, border: `1px solid ${t.border}` }}>
          <h4 style={{ margin: "0 0 12px", color: t.info, fontSize: 14, fontWeight: 700 }}>Import Data</h4>
          <div style={{ fontSize: 12, color: t.textMuted, marginBottom: 12 }}>Import assays, pXRF data, DDR/PLODs, downhole surveys, or hyperspectral data</div>
          {["Assay Results", "pXRF Data", "DDR/PLOD Files", "Downhole Surveys", "Hyperspectral"].map(type => (
            <button key={type} onClick={() => handleImport(type)}
              style={{ width: "100%", padding: 12, borderRadius: 10, border: `1px solid ${t.border}`, background: t.bgInput, color: t.text, fontSize: 13, fontWeight: 600, cursor: "pointer", marginBottom: 6, display: "flex", alignItems: "center", gap: 10, textAlign: "left" }}>
              <Icon d={Icons.log} size={16} color={t.info} />
              {type}
            </button>
          ))}
        </div>
      </div>
    );
  };

  // ─── SETTINGS VIEW ───
  const SettingsView = () => (
    <div style={{ padding: 16 }}>
      <h3 style={{ margin: "0 0 20px", color: t.text, fontSize: 18, fontWeight: 800 }}>Settings</h3>

      <div style={{ padding: 16, borderRadius: 12, background: t.bgCard, border: `1px solid ${t.border}`, marginBottom: 12 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <div style={{ fontSize: 14, fontWeight: 700, color: t.text }}>Dark Mode</div>
            <div style={{ fontSize: 12, color: t.textMuted }}>Switch between light and dark themes</div>
          </div>
          <button onClick={() => setDarkMode(!darkMode)}
            style={{ width: 48, height: 28, borderRadius: 14, border: "none", background: darkMode ? t.accent : t.border, cursor: "pointer", position: "relative", transition: "background 0.2s" }}>
            <div style={{ width: 22, height: 22, borderRadius: 11, background: "#fff", position: "absolute", top: 3, left: darkMode ? 23 : 3, transition: "left 0.2s" }} />
          </button>
        </div>
      </div>

      <div style={{ padding: 16, borderRadius: 12, background: t.bgCard, border: `1px solid ${t.border}`, marginBottom: 12 }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: t.text, marginBottom: 8 }}>Sync Configuration</div>
        <div style={{ fontSize: 12, color: t.textMuted, marginBottom: 12 }}>Configure connection to your main database server</div>
        {[
          { label: "Server URL", value: "https://db.mining-corp.com" },
          { label: "Database", value: "DataShed5_Production" },
          { label: "API Key", value: "••••••••••••dk39" },
        ].map(item => (
          <div key={item.label} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: `1px solid ${t.border}` }}>
            <span style={{ fontSize: 12, color: t.textMuted }}>{item.label}</span>
            <span style={{ fontSize: 12, color: t.text, fontFamily: "monospace" }}>{item.value}</span>
          </div>
        ))}
      </div>

      <div style={{ padding: 16, borderRadius: 12, background: t.bgCard, border: `1px solid ${t.border}`, marginBottom: 12 }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: t.text, marginBottom: 8 }}>User Profile</div>
        {[
          { label: "Name", value: "Karthik" },
          { label: "Role", value: "Senior Geologist" },
          { label: "Company", value: "Mining Corp" },
        ].map(item => (
          <div key={item.label} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: `1px solid ${t.border}` }}>
            <span style={{ fontSize: 12, color: t.textMuted }}>{item.label}</span>
            <span style={{ fontSize: 12, color: t.text }}>{item.value}</span>
          </div>
        ))}
      </div>

      <div style={{ padding: 16, borderRadius: 12, background: t.bgCard, border: `1px solid ${t.border}` }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: t.text, marginBottom: 8 }}>Validation Rules</div>
        <div style={{ fontSize: 12, color: t.textMuted, marginBottom: 8 }}>Data validation templates downloaded from database</div>
        {["Lithology Lookup Table", "Alteration Codes", "Sample ID Format", "Survey Tolerance (±2°)", "Depth Overlap Check"].map(rule => (
          <div key={rule} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 0" }}>
            <Icon d={Icons.check} size={14} color={t.success} />
            <span style={{ fontSize: 12, color: t.text }}>{rule}</span>
          </div>
        ))}
      </div>
    </div>
  );

  // ─── NAVIGATION ───
  const navItems = [
    { key: "dashboard", label: "Dashboard", icon: Icons.home },
    { key: "audit", label: "Audit Trail", icon: Icons.audit },
    { key: "export", label: "Export/Import", icon: Icons.export },
    { key: "settings", label: "Settings", icon: Icons.settings },
  ];

  return (
    <div style={{
      width: "100%", maxWidth: 480, margin: "0 auto", height: "100vh", display: "flex", flexDirection: "column",
      background: t.bg, color: t.text, fontFamily: "'DM Sans', 'Nunito', sans-serif", position: "relative", overflow: "hidden",
    }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap');
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: ${t.border}; border-radius: 2px; }
        select option { background: ${t.bgCard}; color: ${t.text}; }
      `}</style>

      {/* ──── TOP BAR ──── */}
      <div style={{
        display: "flex", alignItems: "center", padding: "10px 16px", borderBottom: `1px solid ${t.border}`,
        background: t.bgCard, zIndex: 50, flexShrink: 0,
      }}>
        <div style={{ flex: 1 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{ width: 28, height: 28, borderRadius: 7, background: `linear-gradient(135deg, ${t.accent}, #FF8F65)`, display: "flex", alignItems: "center", justifyContent: "center" }}>
              <Icon d={Icons.layers} size={14} color="#fff" />
            </div>
            <span style={{ fontSize: 17, fontWeight: 800, color: t.text, letterSpacing: "-0.02em" }}>DrillLog<span style={{ color: t.accent }}>Pro</span></span>
          </div>
        </div>
        {/* Sync indicator */}
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginRight: 4 }}>
          {syncStatus === "syncing" && <div style={{ width: 8, height: 8, borderRadius: 4, background: t.warn, animation: "pulse 1s infinite" }} />}
          <div style={{ width: 8, height: 8, borderRadius: 4, background: syncStatus === "synced" ? t.success : syncStatus === "syncing" ? t.warn : t.textDim }} />
          <span style={{ fontSize: 10, color: t.textDim }}>{syncStatus === "synced" ? "Synced" : syncStatus === "syncing" ? "Syncing" : "Offline"}</span>
        </div>
      </div>

      {/* ──── MAIN CONTENT ──── */}
      <div style={{ flex: 1, overflow: "auto" }}>
        {currentView === "dashboard" && <DashboardView />}
        {currentView === "holeDetail" && <HoleDetailView />}
        {currentView === "audit" && <AuditView />}
        {currentView === "export" && <ExportView />}
        {currentView === "settings" && <SettingsView />}
      </div>

      {/* ──── BOTTOM NAV ──── */}
      {currentView !== "holeDetail" && (
        <div style={{
          display: "flex", borderTop: `1px solid ${t.border}`, background: t.bgCard, flexShrink: 0,
          paddingBottom: "env(safe-area-inset-bottom, 8px)",
        }}>
          {navItems.map(item => (
            <button key={item.key} onClick={() => setCurrentView(item.key)}
              style={{
                flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
                padding: "10px 0 6px", background: "none", border: "none", cursor: "pointer",
                color: currentView === item.key ? t.accent : t.textDim,
              }}>
              <Icon d={item.icon} size={20} color={currentView === item.key ? t.accent : t.textDim} />
              <span style={{ fontSize: 10, fontWeight: currentView === item.key ? 700 : 500 }}>{item.label}</span>
            </button>
          ))}
        </div>
      )}

      {/* ──── FORM MODAL ──── */}
      {showForm && <FormModal />}

      {/* ──── TOAST ──── */}
      {toast && (
        <div style={{
          position: "fixed", bottom: 80, left: "50%", transform: "translateX(-50%)", zIndex: 300,
          padding: "10px 20px", borderRadius: 10,
          background: toast.type === "success" ? t.success : toast.type === "danger" ? t.danger : toast.type === "info" ? t.info : t.warn,
          color: "#fff", fontSize: 13, fontWeight: 700, boxShadow: "0 4px 20px rgba(0,0,0,0.3)",
          animation: "slideUp 0.3s ease-out", whiteSpace: "nowrap",
        }}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(createElement(DrillLogPro));
</script>
</body>
</html>
